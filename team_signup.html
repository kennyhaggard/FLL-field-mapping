<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Team Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <div class="signup-wrapper">
    <div class="panel signup-card">
      <h1 style="margin-top:0;">Register a Team</h1>
      <p>Create a team so missions and robots can be saved securely.</p>
      <p class="notice" id="runtime-note"></p>
      <p><a href="index.html">Back to Mission Tool</a></p>

      <div class="grid-2" style="margin-top:12px;">
        <label>
          Team name
          <input id="team-name" type="text" placeholder="e.g., Spring" />
        </label>
        <label>
          4-digit PIN
          <input id="team-pin" type="text" inputmode="numeric" maxlength="4" placeholder="1111" />
        </label>
        <label style="grid-column: span 2;">
          Coach email
          <input id="coach-email" type="email" placeholder="coach@example.com" />
        </label>
      </div>

      <div style="margin-top:16px;">
        <div
          class="cf-turnstile"
          data-sitekey="0x4AAAAAACGqPr5-hS0AsMjv"
          data-callback="onTurnstileSuccess"
          data-expired-callback="onTurnstileExpired"
          data-error-callback="onTurnstileError">
        </div>
        <p class="notice">If the captcha does not load, disable blockers and refresh.</p>
      </div>

      <div class="button-row" style="margin-top:16px;">
        <button class="btn-primary" id="register-team">Register Team</button>
        <button class="btn-ghost" id="reset-form">Reset</button>
      </div>

      <p class="notice notice-error" id="signup-error" style="display:none;"></p>
      <p class="notice notice-success" id="signup-success" style="display:none;"></p>
    </div>
  </div>

  <script type="module" src="js/signup.js"></script>
</body>
</html>
